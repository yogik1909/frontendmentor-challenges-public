<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | QR code component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/main.css">
</head>

<body>
  <main class="container">
      <div class="hero__image-container">
        <img src="images/image-qr-code.png" alt="QR code for improve your front-end skills by building projects" class="hero__image">
      </div>
      <div class="hero__description-container">
        <h1 class="hero__title">Improve your front-end skills by building projects</h1>
        <p class="hero__description">Scan the QR code to visit Frontend Mentor and take your coding skills to the next
          level</p>
      </div>
  </main>
  <footer class="footer__attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://www.frontendmentor.io/profile/yogik1909">Vladimir</a>.
  </footer>
</body>

</html>
